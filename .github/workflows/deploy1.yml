name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: hahaysh
          key: ${{ secrets.HAHAYSHOPENCLAWSSH }}
          script: |
            cd /home/hahaysh/hahayshopenclaw
            git pull origin main
            rsync -av --checksum \
              /home/hahaysh/hahayshopenclaw/scripts/ \
              /home/hahaysh/investment-assistant/
            echo "✅ Deploy completed at $(date '+%Y-%m-%d %H:%M:%S KST')"
